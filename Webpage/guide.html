        <dl>
            <li>유아지도</li>
            <dd>0-2세 영유아시기는 자장가 노래와 명언을 들려주고 시적인 동요와 시를 같이 읽어주며
                먼저 책과 친해져서 3, 4세가 되었을 때는 그림책을 보여주고 읽어주면서 표현해 보도록한다.</dd>
            <li>초등지도</li>
            <dd>단편 동화나 환상 동화를 봄으로써 흥미를 갖고 보고한다.</dd>
            <li>중등지도</li>
            <dd>중등 시기는 교과서와 관련된 책을 선정해주는 것이 좋으며, 그림이 포함된 책이나 역사와 관련된 책도 좋다.</dd>
